apiVersion: batch/v1
kind: CronJob

metadata:
  name: cron-job-backup
  namespace: nginx

spec:
  schedule: "*/1 * * * *"

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup

        spec:
          containers:
            - name: backup-container
              image: busybox:latest

              command:
                - sh
                - -c
                - >
                  echo "Backup Started";
                  mkdir -p /backups &&
                  mkdir -p /demo-data &&
                  cp -r /demo-data /backups &&
                  echo "Backup Completed";

              volumeMounts:
                - name: data-volume
                  mountPath: /demo-data

                - name: backup-volume
                  mountPath: /backups

          restartPolicy: OnFailure

          volumes:
            - name: data-volume
              hostPath:
                path: /demo-data
                type: DirectoryOrCreate

            - name: backup-volume
              hostPath:
                path: /backups
                type: DirectoryOrCreate
